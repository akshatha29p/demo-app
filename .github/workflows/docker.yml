name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          driver-opts: |
            image=moby/buildkit:v0.27.0
      - name: Curl connectivity test
        run: |
          curl -vk http://localhost:8081/artifactory/api/system/ping

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: hts2-akshathap-docker.jfrog.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile 
          push: true
          tags: mill.jfrog.info:12451/test-docker/demo-app:latest
         
     
          
